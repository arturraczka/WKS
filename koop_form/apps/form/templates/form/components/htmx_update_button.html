<button
  type="button"
  class="btn btn-margin-fix btn-outline-primary"
  hx-post="{{ post_url }}"
  hx-vals='{"orderitem_id": {{ order_item.id }}, "product_id": {{ record.id }}, "row_num": {{ row_num }}}'
  hx-target="#row-{{ record.id }}"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
  hx-swap="outerHTML"
  hx-include="#id_{{ row_num }}-quantity">
  Zmień
</button>
